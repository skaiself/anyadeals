services:
  # NOTE: Traefik disabled — incompatible with Docker API on this host.
  # Orchestrator dashboard exposed directly on port 8080.
  # Re-enable Traefik when Docker API compatibility is resolved.
  #
  # traefik:
  #   image: traefik:v3.4
  #   ...

  orchestrator:
    build: ./services/orchestrator
    container_name: anyadeals-orchestrator
    user: "1000:1000"
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./site/data:/data
      - .:/repo
    environment:
      - DATA_DIR=/data
      - REPO_DIR=/repo
      - GITHUB_TOKEN=${GITHUB_TOKEN}
    depends_on:
      - researcher
      - validator
      - poster
    networks:
      - pipeline

  researcher:
    build: ./services/researcher
    container_name: anyadeals-researcher
    user: "1000:1000"
    restart: unless-stopped
    volumes:
      - ./site/data:/data
    environment:
      - DATA_DIR=/data
    networks:
      - pipeline

  validator:
    build: ./services/validator
    container_name: anyadeals-validator
    user: "1000:1000"
    restart: unless-stopped
    volumes:
      - ./site/data:/data
    environment:
      - DATA_DIR=/data
      - CONFIG_PATH=/app/config.json
      - PROXY_URL=${PROXY_URL}
      - PROXY_URL_US=${PROXY_URL_US:-}
      - PROXY_URL_DE=${PROXY_URL_DE:-}
      - BROWSER_PROXY_URL=${BROWSER_PROXY_URL:-}
      - IHERB_PROXY_URL=http://172.19.0.1:8088
    networks:
      - pipeline

  poster:
    build: ./services/poster
    container_name: anyadeals-poster
    user: "1000:1000"
    restart: unless-stopped
    volumes:
      - ./site/data:/data
    environment:
      - DATA_DIR=/data
      - TWITTER_API_KEY=${TWITTER_API_KEY}
      - TWITTER_API_SECRET=${TWITTER_API_SECRET}
      - TWITTER_ACCESS_TOKEN=${TWITTER_ACCESS_TOKEN}
      - TWITTER_ACCESS_SECRET=${TWITTER_ACCESS_SECRET}
      - REDDIT_CLIENT_ID=${REDDIT_CLIENT_ID}
      - REDDIT_CLIENT_SECRET=${REDDIT_CLIENT_SECRET}
      - REDDIT_USERNAME=${REDDIT_USERNAME}
      - REDDIT_PASSWORD=${REDDIT_PASSWORD}
    networks:
      - pipeline

networks:
  pipeline:
    driver: bridge
